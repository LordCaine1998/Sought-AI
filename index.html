<script>
// Guard against canvas gradient crashes when a canvas is measured before layout
// settles (0-size or transiently NaN coordinates from drag/resize timing).
(function(){
  const fin = v => Number.isFinite(v) ? v : 0;
  const proto = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
  if(!proto) return;
  const origLinear = proto.createLinearGradient;
  const origRadial = proto.createRadialGradient;
  proto.createLinearGradient = function(x0,y0,x1,y1){
    return origLinear.call(this, fin(x0), fin(y0), fin(x1), fin(y1));
  };
  proto.createRadialGradient = function(x0,y0,r0,x1,y1,r1){
    return origRadial.call(this, fin(x0), fin(y0), Math.max(0,fin(r0)), fin(x1), fin(y1), Math.max(0,fin(r1)));
  };
})();
</script>

/* ══════════════ ULTRA BRAND TRANSFORMS ══════════════ */

/* ── NARUTO ── */
[data-theme="naruto"] .brand-name { font-family: 'Instrument Serif', serif; letter-spacing:.04em; }
[data-theme="naruto"] .brand-name em { color:#ff7800; text-shadow:0 0 12px rgba(255,120,0,.8); font-style:normal; }
[data-theme="naruto"] #logo-sb circle { fill:#ff7800; filter:drop-shadow(0 0 6px #ff7800); }
[data-theme="naruto"] #logo-sb line { stroke:#ff7800; }
[data-theme="naruto"] .brand-name .ultra-o {
  display:inline-block; width:1em; height:1em; vertical-align:middle;
  background:radial-gradient(circle at 40% 40%,#fff9e0 0%,#ffaa00 30%,#ff6600 55%,#cc3300 75%,#330000 100%);
  border-radius:50%; box-shadow:0 0 0 2px #ff7800, 0 0 8px 2px rgba(255,120,0,.7);
  position:relative; top:-.05em; margin:0 1px;
  animation:rasengan-spin 1.2s linear infinite, rasengan-pulse 2s ease-in-out infinite;
}
[data-theme="naruto"] .brand-name .ultra-o::after {
  content:''; position:absolute; inset:-3px; border-radius:50%;
  background:conic-gradient(transparent 0deg,rgba(255,200,100,.6) 60deg,transparent 180deg,rgba(255,200,100,.6) 240deg,transparent 360deg);
  animation:rasengan-spin 0.5s linear infinite reverse;
}
@keyframes rasengan-spin { to{transform:rotate(360deg);} }
@keyframes rasengan-pulse { 0%,100%{box-shadow:0 0 0 2px #ff7800,0 0 8px 2px rgba(255,120,0,.7);} 50%{box-shadow:0 0 0 3px #ff7800,0 0 16px 5px rgba(255,120,0,.9);} }

/* ── NARUTO VS SASUKE EASTER EGG ── */
#naruto-scene{
  position:fixed;top:12px;left:12px;width:520px;height:160px;
  z-index:9999;pointer-events:none;display:none;
  background:rgba(0,0,0,0.08);border-radius:10px;
  border:1px solid rgba(255,120,0,0.25);backdrop-filter:blur(3px);
}
#naruto-scene.show{display:block;}
#naruto-canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}

  display:inline-block; width:1em; height:1em; vertical-align:middle;
  border:2px solid #e8200a; border-radius:50%; position:relative; top:-.05em; margin:0 1px;
  box-shadow:0 0 8px rgba(232,32,10,.8);

/* ━━━━━━━━━━  AUTH  ━━━━━━━━━━ */
/* ━━━━━━━━━━  AUTH SCREEN — REDESIGNED V2  ━━━━━━━━━━ */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap');

#auth-screen{
  position:fixed;inset:0;
  background:#07050f;
  display:flex;align-items:stretch;justify-content:stretch;
  z-index:500;
  overflow:hidden;
}
#auth-screen.gone{display:none;}

/* ── Deep space background with layered gradients ── */
#auth-bg-canvas{
  position:absolute;inset:0;z-index:0;pointer-events:none;
}

/* animated radial orbs */
#auth-screen::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 18% 55%, rgba(124,92,191,.28) 0%, transparent 65%),
    radial-gradient(ellipse 50% 45% at 78% 18%, rgba(88,40,160,.22) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 88% 82%, rgba(110,60,200,.16) 0%, transparent 55%),
    radial-gradient(ellipse 30% 30% at 50% 10%, rgba(200,160,255,.08) 0%, transparent 70%);
  pointer-events:none;z-index:0;
  animation:auth-orb-drift 14s ease-in-out infinite alternate;
}
@keyframes auth-orb-drift{
  0%{opacity:1;transform:scale(1) translate(0,0);}
  33%{opacity:.85;transform:scale(1.04) translate(8px,-6px);}
  66%{opacity:.9;transform:scale(1.02) translate(-6px,4px);}
  100%{opacity:.78;transform:scale(1.07) translate(4px,8px);}
}

/* subtle star-like grain */
#auth-screen::after{
  content:'';
  position:absolute;inset:0;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.55;
}

/* animated grid lines (subtle) */
.auth-grid{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(160,126,232,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(160,126,232,.04) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 20% 50%, black 20%, transparent 80%);
  animation:auth-grid-shift 20s linear infinite;
}
@keyframes auth-grid-shift{
  from{background-position:0 0;}
  to{background-position:60px 60px;}
}

/* ── SPLIT LAYOUT ── */
#auth-panel-left{
  flex:1;
  display:flex;flex-direction:column;justify-content:center;
  padding:32px 48px;
  position:relative;z-index:1;
  overflow-y:auto;
  min-height:0;
}
#auth-panel-right{
  width:468px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  padding:40px 48px;
  position:relative;z-index:1;
  border-left:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(32px);
}
/* glowing right border */
#auth-panel-right::before{
  content:'';position:absolute;left:0;top:10%;bottom:10%;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(160,126,232,.5) 40%,rgba(124,92,191,.7) 60%,transparent);
  pointer-events:none;
}

/* ── LOGO & BRAND ── */
.auth-brand-logo{
  display:flex;align-items:center;gap:16px;
  margin-bottom:24px;
  animation:auth-brand-in .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes auth-brand-in{
  from{opacity:0;transform:translateY(-12px);}
  to{opacity:1;transform:none;}
}

/* Animated logo SVG */
.auth-logo-svg{
  position:relative;width:48px;height:48px;flex-shrink:0;
}
.auth-logo-svg svg{
  width:48px;height:48px;
  filter:drop-shadow(0 0 14px rgba(160,126,232,.7));
  animation:auth-logo-spin 16s linear infinite;
  transform-origin:center;
}
@keyframes auth-logo-spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
.auth-logo-svg svg circle{
  animation:auth-logo-pulse 3s ease-in-out infinite;
}
@keyframes auth-logo-pulse{
  0%,100%{r:9;opacity:1;}
  50%{r:11;opacity:.85;}
}
/* Individual rays stagger */
.auth-logo-svg svg line:nth-child(2){animation:auth-ray-fade 3s ease-in-out infinite 0s;}
.auth-logo-svg svg line:nth-child(3){animation:auth-ray-fade 3s ease-in-out infinite .375s;}
.auth-logo-svg svg line:nth-child(4){animation:auth-ray-fade 3s ease-in-out infinite .75s;}
.auth-logo-svg svg line:nth-child(5){animation:auth-ray-fade 3s ease-in-out infinite 1.125s;}
.auth-logo-svg svg line:nth-child(6){animation:auth-ray-fade 3s ease-in-out infinite 1.5s;}
.auth-logo-svg svg line:nth-child(7){animation:auth-ray-fade 3s ease-in-out infinite 1.875s;}
.auth-logo-svg svg line:nth-child(8){animation:auth-ray-fade 3s ease-in-out infinite 2.25s;}
.auth-logo-svg svg line:nth-child(9){animation:auth-ray-fade 3s ease-in-out infinite 2.625s;}
@keyframes auth-ray-fade{
  0%,100%{opacity:.4;stroke-width:3;}
  50%{opacity:1;stroke-width:4;}
}

.auth-brand-text{display:flex;flex-direction:column;gap:2px;}
.auth-brand-name{
  font-family:'Syne',var(--se);font-size:24px;font-weight:800;
  color:#fff;letter-spacing:-.02em;line-height:1;
}
.auth-brand-name em{font-style:normal;color:#b894ff;}
.auth-brand-tagline{
  font-size:11.5px;font-family:var(--sa);
  color:rgba(160,126,232,.65);letter-spacing:.06em;text-transform:uppercase;
  font-weight:500;
}

/* ── HERO TEXT BLOCK ── */
.auth-hero-block{
  margin-bottom:18px;
  animation:auth-hero-in .8s cubic-bezier(.22,1,.36,1) .08s both;
}
@keyframes auth-hero-in{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:none;}
}
.auth-hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(124,92,191,.18);
  border:1px solid rgba(160,126,232,.3);
  border-radius:99px;padding:5px 14px;
  font-size:11px;font-weight:600;
  color:rgba(200,170,255,.9);
  letter-spacing:.07em;text-transform:uppercase;
  font-family:var(--sa);
  margin-bottom:12px;
}
.auth-hero-eyebrow::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:#b894ff;box-shadow:0 0 8px rgba(184,148,255,.8);
  animation:eyebrow-pulse 2s ease-in-out infinite;
}
@keyframes eyebrow-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.7);}}

.auth-hero-headline{
  font-family:'Syne',var(--se);
  font-size:clamp(28px,2.6vw,40px);
  font-weight:800;
  color:#fff;
  line-height:1.1;
  letter-spacing:-.035em;
  margin-bottom:10px;
}
.auth-hero-headline em{
  font-style:italic;
  background:linear-gradient(135deg,#d4b8ff 0%,#9b70ee 50%,#c4a0ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
}

.auth-hero-sub{
  font-size:13.5px;color:rgba(255,255,255,.48);
  line-height:1.6;max-width:400px;
  font-family:var(--sa);
}

/* ── FEATURE PILLS ROW ── */
.auth-feature-pills{
  display:flex;flex-wrap:wrap;gap:8px;
  animation:auth-pills-in .9s cubic-bezier(.22,1,.36,1) .18s both;
}
@keyframes auth-pills-in{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:none;}
}
.auth-pill{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  padding:7px 12px;
  transition:background .2s,border-color .2s,transform .2s;
  cursor:default;
}
.auth-pill:hover{
  background:rgba(124,92,191,.15);
  border-color:rgba(160,126,232,.35);
  transform:translateY(-2px);
}
.auth-pill-icon{
  width:26px;height:26px;border-radius:7px;
  background:rgba(124,92,191,.2);
  display:flex;align-items:center;justify-content:center;
  color:#b894ff;flex-shrink:0;
  font-size:13px;
}
.auth-pill-info{display:flex;flex-direction:column;gap:1px;}
.auth-pill-title{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.88);font-family:var(--sa);}
.auth-pill-desc{font-size:10.5px;color:rgba(255,255,255,.38);font-family:var(--sa);}

/* ── SOCIAL PROOF ── */
.auth-social-proof{
  display:flex;align-items:center;gap:12px;
  margin-top:16px;
  animation:auth-proof-in 1s cubic-bezier(.22,1,.36,1) .28s both;
}
@keyframes auth-proof-in{
  from{opacity:0;}
  to{opacity:1;}
}
.auth-avatar-stack{display:flex;}
.auth-avatar{
  width:28px;height:28px;border-radius:50%;
  border:2px solid #07050f;
  margin-left:-8px;
  background:linear-gradient(135deg,#9b70ee,#7c5cbf);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
  font-family:var(--sa);
  flex-shrink:0;
}
.auth-avatar:first-child{margin-left:0;}
.auth-avatar:nth-child(2){background:linear-gradient(135deg,#c4a0ff,#9b70ee);}
.auth-avatar:nth-child(3){background:linear-gradient(135deg,#7c5cbf,#5a3fa0);}
.auth-avatar:nth-child(4){background:linear-gradient(135deg,#b894ff,#7c5cbf);}
.auth-proof-text{
  font-size:12px;color:rgba(255,255,255,.4);font-family:var(--sa);line-height:1.5;
}
.auth-proof-text strong{color:rgba(255,255,255,.7);}
.auth-stars{color:#f0b800;font-size:11px;letter-spacing:1px;}

/* ── RIGHT PANEL — CARD ── */
#auth-card{
  width:100%;
  display:flex;flex-direction:column;align-items:stretch;gap:0;
  animation:auth-card-in .65s cubic-bezier(.22,1,.36,1) .05s both;
}
@keyframes auth-card-in{
  from{opacity:0;transform:translateY(24px) scale(.98);}
  to{opacity:1;transform:none;}
}

/* Card top logo (mobile-style on right panel) */
.auth-card-logo{
  display:flex;align-items:center;gap:11px;margin-bottom:22px;
}
.auth-card-logo-icon{
  width:40px;height:40px;position:relative;
}
.auth-card-logo-icon svg{
  width:40px;height:40px;
  filter:drop-shadow(0 0 10px rgba(160,126,232,.6));
  animation:auth-logo-spin 16s linear infinite;
  transform-origin:center;
}
.auth-card-logo-name{
  font-family:'Syne',var(--se);font-size:19px;font-weight:800;
  color:#fff;letter-spacing:-.02em;
}
.auth-card-logo-name em{font-style:normal;color:#b894ff;}

.auth-card-heading{
  font-family:'Syne',var(--se);font-size:27px;font-weight:800;
  color:#fff;letter-spacing:-.025em;
  margin-bottom:5px;
}
.auth-card-heading em{font-style:italic;color:#b894ff;}
.auth-sub{
  font-size:13.5px;color:rgba(255,255,255,.42);
  margin-bottom:22px;
  font-family:var(--sa);line-height:1.5;
}

/* ── TABS ── */
.auth-tabs{
  display:flex;gap:0;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:13px;padding:4px;
  width:100%;margin:0 0 22px;
}
.auth-tab{
  flex:1;padding:10px 6px;border-radius:10px;
  font-size:12.5px;font-weight:600;
  color:rgba(255,255,255,.38);
  text-align:center;cursor:pointer;
  transition:background .18s,color .18s,box-shadow .18s;
  font-family:var(--sa);
  letter-spacing:.01em;
  display:flex;align-items:center;justify-content:center;
  min-height:40px;line-height:1.25;
}
.auth-tab.on{
  background:linear-gradient(135deg,rgba(155,112,238,.7),rgba(124,92,191,.8));
  color:#fff;
  box-shadow:0 2px 14px rgba(124,92,191,.45);
}

/* ── FORM ── */
.af{display:flex;flex-direction:column;gap:12px;width:100%;}
.afl{display:flex;flex-direction:column;gap:6px;}
.afl label{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,.4);
  letter-spacing:.09em;text-transform:uppercase;
  font-family:var(--sa);
}
.ai-inp{
  padding:12px 16px;
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:12px;
  font-size:14px;
  color:#fff;
  background:rgba(255,255,255,.055);
  outline:none;width:100%;
  font-family:var(--sa);
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.ai-inp::placeholder{color:rgba(255,255,255,.22);}
.ai-inp:focus{
  border-color:rgba(160,126,232,.65);
  box-shadow:0 0 0 3px rgba(124,92,191,.18);
  background:rgba(255,255,255,.08);
}
#auth-err{
  font-size:12px;color:#ff6b8a;
  text-align:center;min-height:16px;
  font-family:var(--sa);
}

/* ── PRIMARY BUTTON ── */
.auth-btn{
  padding:13.5px;
  background:linear-gradient(135deg,#a07ee8 0%,#7c5cbf 60%,#9060d8 100%);
  background-size:200% 100%;
  color:#fff;
  border-radius:12px;font-size:14px;font-weight:700;
  width:100%;
  transition:background-position .3s,opacity .18s,transform .12s,box-shadow .2s;
  font-family:'Syne',var(--sa);
  letter-spacing:.01em;
  box-shadow:0 4px 22px rgba(124,92,191,.5),0 1px 0 rgba(255,255,255,.12) inset;
}
.auth-btn:hover{
  background-position:100% 0;
  box-shadow:0 6px 30px rgba(124,92,191,.65),0 1px 0 rgba(255,255,255,.15) inset;
}
.auth-btn:active{transform:scale(.98);}

/* ── OR DIVIDER ── */
.auth-or{display:flex;align-items:center;gap:12px;width:100%;}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.09);}
.auth-or span{font-size:11px;color:rgba(255,255,255,.28);font-family:var(--sa);letter-spacing:.05em;}

/* ── GOOGLE BTN ── */
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:12.5px;
  border:1.5px solid rgba(255,255,255,.11);
  border-radius:12px;font-size:14px;font-weight:500;
  color:rgba(255,255,255,.78);
  width:100%;
  background:rgba(255,255,255,.045);
  transition:background .18s,border-color .18s,transform .12s;
  font-family:var(--sa);
}
.google-btn:hover{
  background:rgba(255,255,255,.09);
  border-color:rgba(255,255,255,.2);
  transform:translateY(-1px);
}
.google-btn:active{transform:scale(.98);}
.google-btn svg{flex-shrink:0;}


/* ━━━━━━━━━━  DM OVERLAY  ━━━━━━━━━━ */
#dm-overlay{
  position:fixed;inset:0;z-index:600;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.48);backdrop-filter:blur(8px);
  padding:16px;
}
#dm-overlay.show{display:flex;}
#dm-panel{
  background:var(--sf);border:1px solid var(--bm);border-radius:22px;
  box-shadow:0 24px 72px rgba(0,0,0,.22);
  width:820px;max-width:100%;height:82vh;max-height:680px;
  display:flex;overflow:hidden;position:relative;animation:dmpop .28s cubic-bezier(.34,1.3,.64,1);
}
@keyframes dmpop{from{opacity:0;transform:scale(.93) translateY(14px);}to{opacity:1;transform:none;}}
/* left sidebar */
#dm-sidebar{
  width:270px;flex-shrink:0;border-right:1px solid var(--b);
  display:flex;flex-direction:column;background:var(--sb);
}
#dm-sidebar-header{
  padding:18px 16px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;
}
#dm-sidebar-title{font-family:var(--se);font-size:18px;color:var(--t);flex:1;letter-spacing:-.012em;}
#dm-new-btn{
  width:30px;height:30px;border-radius:8px;background:var(--a);color:#fff;
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .14s;flex-shrink:0;
}
#dm-new-btn:hover{background:var(--ah);}
.U #dm-new-btn{background:var(--g);}
.U #dm-new-btn:hover{background:var(--gh);}
#dm-close-btn{
  width:30px;height:30px;border-radius:8px;background:var(--b);color:var(--t2);
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:background .14s;flex-shrink:0;
}
#dm-close-btn:hover{background:var(--bm);}
#dm-search-wrap{
  margin:10px 12px 6px;position:relative;
}
#dm-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);}
#dm-search{
  width:100%;padding:8px 10px 8px 32px;border:1.5px solid var(--b);border-radius:10px;
  background:var(--sf);color:var(--t);font-size:13px;font-family:var(--sa);outline:none;
  transition:border-color .14s;
}
#dm-search:focus{border-color:var(--a);}
.dm-tabs{display:flex;gap:0;padding:4px 12px 8px;}
.dm-tab{
  flex:1;padding:6px 4px;text-align:center;font-size:12px;font-weight:500;
  color:var(--t3);border-radius:8px;cursor:pointer;transition:background .14s,color .14s;font-family:var(--sa);
}
.dm-tab.on{background:var(--as);color:var(--a);}
.U .dm-tab.on{background:var(--gs);color:var(--g);}
#dm-contacts{flex:1;overflow-y:auto;padding:4px 0;}
#dm-contacts::-webkit-scrollbar{width:3px;}
#dm-contacts::-webkit-scrollbar-thumb{background:var(--bm);border-radius:2px;}
.dm-contact{
  display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;
  transition:background .12s;border-radius:12px;margin:1px 8px;
}
.dm-contact:hover{background:var(--b);}
.dm-contact.active{background:var(--as);}
.U .dm-contact.active{background:var(--gs);}
.dm-av{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;position:relative;
}
.dm-av-online::after{
  content:'';position:absolute;bottom:1px;right:1px;
  width:9px;height:9px;border-radius:50%;
  background:#27ae60;border:2px solid var(--sb);
}
.dm-cinfo{flex:1;min-width:0;}
.dm-cname{font-size:13.5px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dm-clast{font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.dm-cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.dm-ctime{font-size:10.5px;color:var(--t3);}
.dm-cunread{
  background:var(--a);color:#fff;border-radius:99px;
  font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;
}
.U .dm-cunread{background:var(--g);}
/* right chat area */
#dm-chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
#dm-list-view{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#dm-list-view.hidden{display:none;}
#dm-empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  color:var(--t3);text-align:center;padding:40px;
}
#dm-empty-state svg{opacity:.3;}
#dm-empty-state p{font-size:14px;line-height:1.6;max-width:240px;}
#dm-chat-view{display:none;flex-direction:column;flex:1;overflow:hidden;}
#dm-chat-view.show{display:flex;}
#dm-chat-header{
  display:flex;align-items:center;gap:11px;
  padding:14px 18px;border-bottom:1px solid var(--b);flex-shrink:0;
}
#dm-back-btn{
  width:28px;height:28px;border-radius:7px;border:none;background:var(--b);
  color:var(--t2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:background .14s;flex-shrink:0;
}
#dm-back-btn:hover{background:var(--bm);}
#dm-chat-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
#dm-chat-info{flex:1;min-width:0;}
#dm-chat-name{font-size:14.5px;font-weight:700;color:var(--t);}
#dm-chat-status{font-size:11.5px;color:var(--t3);margin-top:1px;}
#dm-msgs{
  flex:1;overflow-y:auto;padding:18px 18px 8px;
  display:flex;flex-direction:column;gap:4px;min-height:0;
}
#dm-msgs::-webkit-scrollbar{width:3px;}
#dm-msgs::-webkit-scrollbar-thumb{background:var(--bm);border-radius:2px;}
.dm-date-div{
  text-align:center;font-size:11px;color:var(--t3);padding:8px 0;font-weight:500;
}
.dm-msg-row{display:flex;align-items:flex-end;gap:8px;animation:popup .2s ease;}
.dm-msg-row.mine{flex-direction:row-reverse;}
.dm-avatar-sm{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
}
.dm-bubble{
  padding:9px 13px;border-radius:18px;font-size:13.5px;line-height:1.55;
  color:var(--t);background:var(--bg);border:1px solid var(--b);
  max-width:100%;word-break:break-word;
}
.dm-msg-row.mine .dm-bubble{
  background:var(--a);color:#fff;border-color:transparent;
}
.U .dm-msg-row.mine .dm-bubble{background:var(--g);}
.dm-bubble-time{font-size:10.5px;color:var(--t3);margin-top:2px;padding:0 2px;}
.dm-msg-row.mine .dm-bubble-time{text-align:right;}
/* input bar */
#dm-input-bar{
  padding:0;border-top:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;
}
#dm-input-bar-inner{
  padding:10px 14px;display:flex;align-items:flex-end;gap:8px;
}
#dm-inp{
  flex:1;padding:9px 13px;border-radius:12px;border:1.5px solid var(--bm);
  background:var(--bg);color:var(--t);font-size:13.5px;font-family:var(--sa);
  line-height:1.5;resize:none;outline:none;max-height:100px;overflow-y:auto;
  transition:border-color .14s;
}
#dm-input-bar-inner{padding:10px 14px;display:flex;align-items:flex-end;gap:8px;}
#dm-inp:focus{border-color:var(--a);}
.U #dm-inp:focus{border-color:var(--g);}
#dm-emoji-btn,#dm-send-btn{
  width:36px;height:36px;border-radius:10px;border:none;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .14s;
}
#dm-emoji-btn{background:var(--b);color:var(--t2);}
#dm-emoji-btn:hover{background:var(--bm);}
#dm-send-btn{background:var(--a);color:#fff;}
#dm-send-btn:hover{background:var(--ah);}
.U #dm-send-btn{background:var(--g);}
.U #dm-send-btn:hover{background:var(--gh);}
#dm-gif-btn{width:36px;height:36px;border-radius:10px;border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--b);color:var(--t2);font-size:11px;font-weight:700;letter-spacing:-.3px;transition:background .14s,color .14s;}
#dm-gif-btn:hover{background:var(--bm);color:var(--a);}
#dm-gif-btn.active{background:var(--as);color:var(--a);}
#dm-img-btn{width:36px;height:36px;border-radius:10px;border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--b);color:var(--t2);transition:background .14s,color .14s;}
#dm-img-btn:hover{background:var(--bm);color:var(--a);}
#dm-gif-picker{display:none;position:absolute;bottom:70px;left:14px;right:14px;background:var(--sf);border:1px solid var(--bm);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.14);overflow:hidden;z-index:20;flex-direction:column;}
#dm-gif-picker.open{display:flex;}
#dm-gif-search-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--b);}
#dm-gif-search-inp{flex:1;border:1px solid var(--bm);border-radius:8px;padding:6px 10px;font-size:13px;background:var(--bg);color:var(--t);outline:none;transition:border-color .15s;}
#dm-gif-search-inp:focus{border-color:var(--a);}
#dm-gif-search-btn{padding:6px 12px;background:var(--a);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.U #dm-gif-search-btn{background:var(--g);}
#dm-gif-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px;max-height:220px;overflow-y:auto;}
#dm-gif-status{padding:16px;text-align:center;font-size:13px;color:var(--t3);display:none;}
.dm-img-bubble{max-width:220px;border-radius:10px;overflow:hidden;cursor:pointer;}
.dm-img-bubble img{width:100%;display:block;border-radius:10px;}
.dm-emoji{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;border-radius:8px;transition:background .12s;
}
.dm-emoji:hover{background:var(--b);}
#dm-emoji-picker{display:none;}
#dm-emoji-grid{display:grid;grid-template-columns:repeat(5,32px);gap:4px;}
/* new DM modal */
#dm-new-modal{
  position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);
  z-index:10;display:none;align-items:center;justify-content:center;border-radius:22px;
}
#dm-new-modal.show{display:flex;}
#dm-new-card{
  background:var(--sf);border:1px solid var(--bm);border-radius:16px;
  padding:22px 22px 18px;width:340px;display:flex;flex-direction:column;gap:12px;
  box-shadow:0 16px 48px rgba(0,0,0,.22);animation:dmpop .22s cubic-bezier(.34,1.3,.64,1);
}
.dm-new-title{font-family:var(--se);font-size:18px;color:var(--t);}
#dm-new-name-inp{
  width:100%;padding:9px 12px;border:1.5px solid var(--bm);border-radius:10px;
  background:var(--bg);color:var(--t);font-size:13.5px;font-family:var(--sa);outline:none;
  transition:border-color .14s;
}
#dm-new-name-inp:focus{border-color:var(--a);}
#dm-new-user-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;}
.dm-new-user{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
  cursor:pointer;transition:background .12s;
}
.dm-new-user:hover{background:var(--b);}
.dm-new-user-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
}
.dm-new-user-name{font-size:13.5px;font-weight:600;color:var(--t);}
.dm-new-user-email{font-size:11.5px;color:var(--t3);margin-top:1px;}
.dm-new-cancel{
  align-self:center;background:none;border:none;font-size:13px;color:var(--t3);
  cursor:pointer;font-family:var(--sa);padding:4px 8px;border-radius:7px;
  transition:background .14s,color .14s;
}
.dm-new-cancel:hover{background:var(--b);color:var(--t2);}
/* sidebar Messages nav badge */
#msg-nav-badge{
  display:none;background:var(--a);color:#fff;border-radius:99px;
  font-size:9px;font-weight:700;padding:1px 6px;margin-left:auto;
}
#msg-nav-badge.show{display:inline-block;}

/* ── FINE PRINT ── */
.auth-fine{font-size:12px;color:rgba(255,255,255,.28);text-align:center;line-height:1.6;font-family:var(--sa);margin-top:4px;}
.auth-fine strong{color:rgba(180,148,255,.75);font-weight:600;}

/* ── WHATS NEW TICKER ── */
.auth-ticker-wrap{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;
  overflow:hidden;
  margin-top:10px;
  height:32px;
  flex-shrink:0;
  animation:auth-pills-in .9s cubic-bezier(.22,1,.36,1) .22s both;
}
.auth-ticker-label{
  background:linear-gradient(135deg,rgba(155,112,238,.7),rgba(124,92,191,.8));
  color:#fff;
  font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:0 12px;
  height:100%;display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;
  font-family:var(--sa);
}
.auth-ticker-track{
  flex:1;overflow:hidden;position:relative;
  mask-image:linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%);
}
.auth-ticker-inner{
  display:flex;align-items:center;gap:0;
  animation:ticker-scroll 24s linear infinite;
  white-space:nowrap;
}
.auth-ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker-scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
.auth-ticker-item{
  display:inline-flex;align-items:center;gap:6px;
  padding:0 20px;
  font-size:11.5px;color:rgba(255,255,255,.5);
  font-family:var(--sa);
}
.auth-ticker-item strong{color:rgba(200,170,255,.9);font-weight:600;}
.auth-ticker-sep{color:rgba(255,255,255,.15);padding:0 4px;}

/* ── TIER CARDS ── */
.auth-tier-row{
  display:flex;gap:8px;margin-top:10px;
  animation:auth-pills-in .9s cubic-bezier(.22,1,.36,1) .3s both;
}
.auth-tier-card{
  flex:1;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;
  padding:10px 12px;
  display:flex;flex-direction:column;gap:4px;
  position:relative;overflow:hidden;
  transition:border-color .2s,background .2s,transform .2s;
  cursor:default;
}
.auth-tier-card:hover{transform:translateY(-2px);}
.auth-tier-card.tc-free:hover{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.055);}
.auth-tier-card.tc-paragon{border-color:rgba(124,92,191,.25);}
.auth-tier-card.tc-paragon:hover{border-color:rgba(160,126,232,.45);background:rgba(124,92,191,.08);}
.auth-tier-card.tc-ultra{border-color:rgba(176,128,16,.25);}
.auth-tier-card.tc-ultra:hover{border-color:rgba(220,168,40,.45);background:rgba(176,128,16,.08);}
.auth-tier-card.tc-paragon::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,92,191,.07) 0%,transparent 60%);
  pointer-events:none;
}
.auth-tier-card.tc-ultra::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(176,128,16,.07) 0%,transparent 60%);
  pointer-events:none;
}
.auth-tier-name{
  font-family:'Syne',var(--sa);font-size:11px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;
}
.tc-free .auth-tier-name{color:rgba(255,255,255,.55);}
.tc-paragon .auth-tier-name{color:#b894ff;}
.tc-ultra .auth-tier-name{color:#e8b840;}
.auth-tier-price{
  font-family:'Syne',var(--sa);font-size:15px;font-weight:800;
  color:#fff;line-height:1;
}
.auth-tier-price span{font-size:9px;font-weight:500;color:rgba(255,255,255,.35);margin-left:1px;}
.auth-tier-perk{
  font-size:10px;color:rgba(255,255,255,.38);
  font-family:var(--sa);line-height:1.4;
}
.tc-paragon .auth-tier-perk{color:rgba(184,148,255,.6);}
.tc-ultra .auth-tier-perk{color:rgba(232,184,64,.55);}
.auth-tier-badge{
  position:absolute;top:8px;right:8px;
  font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 7px;border-radius:99px;
  font-family:var(--sa);
}
.tc-paragon .auth-tier-badge{background:rgba(124,92,191,.3);color:#c4a0ff;border:1px solid rgba(160,126,232,.3);}
.tc-ultra .auth-tier-badge{background:rgba(176,128,16,.3);color:#e8c060;border:1px solid rgba(220,168,40,.3);}

/* ── LIVE STATS ROW ── */
.auth-stats-row{
  display:flex;gap:8px;margin-top:10px;
  animation:auth-proof-in 1s cubic-bezier(.22,1,.36,1) .35s both;
}
.auth-stat{
  flex:1;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:10px;
  padding:8px 10px;
  display:flex;flex-direction:column;gap:2px;
  align-items:center;text-align:center;
}
.auth-stat-value{
  font-family:'Syne',var(--sa);font-size:15px;font-weight:800;
  color:#fff;line-height:1;
}
.auth-stat-value .stat-accent{
  background:linear-gradient(135deg,#d4b8ff,#9b70ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-stat-label{
  font-size:9.5px;color:rgba(255,255,255,.35);
  letter-spacing:.06em;text-transform:uppercase;
  font-family:var(--sa);
}

/* ── PASSWORD STRENGTH ── */
.auth-pw-strength{
  display:flex;gap:4px;margin-top:-4px;
}
.pw-bar{
  flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.08);
  transition:background .35s;
}
.pw-bar.pw-weak{background:#e05060;}
.pw-bar.pw-fair{background:#e09020;}
.pw-bar.pw-good{background:#60b060;}
.pw-bar.pw-strong{background:#40c880;}
.auth-pw-hint{
  font-size:10.5px;color:rgba(255,255,255,.3);
  font-family:var(--sa);margin-top:2px;
  transition:color .3s;
  min-height:14px;
}
.auth-pw-hint.pw-weak{color:#e08090;}
.auth-pw-hint.pw-fair{color:#d4a040;}
.auth-pw-hint.pw-good{color:#70c070;}
.auth-pw-hint.pw-strong{color:#40c880;}

/* ── AUTH PARTICLES ── */
#auth-particles{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  opacity:.7;
}

/* ── WHAT'S NEW BADGE (on card) ── */
.auth-whats-new{
  display:flex;align-items:center;gap:8px;
  background:rgba(124,92,191,.12);
  border:1px solid rgba(160,126,232,.22);
  border-radius:10px;padding:8px 12px;
  margin-bottom:14px;
  cursor:default;
  transition:background .2s;
}
.auth-whats-new:hover{background:rgba(124,92,191,.2);}
.auth-wn-dot{
  width:6px;height:6px;border-radius:50%;
  background:#b894ff;flex-shrink:0;
  box-shadow:0 0 7px rgba(184,148,255,.9);
  animation:eyebrow-pulse 2s ease-in-out infinite;
}
.auth-wn-text{
  font-size:11.5px;font-family:var(--sa);
  color:rgba(200,170,255,.75);flex:1;line-height:1.35;
}
.auth-wn-text strong{color:rgba(200,170,255,.95);font-weight:600;}
.auth-wn-arrow{color:rgba(160,126,232,.5);font-size:12px;flex-shrink:0;}

/* ── MOBILE: stack panels ── */

/* ━━━━━━━━━━  SLIDESHOW  ━━━━━━━━━━ */
#auth-slideshow{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;min-height:0;
  margin-bottom:28px;
}
.auth-slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:center;
  opacity:0;transform:translateX(40px);
  transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.auth-slide.active{
  opacity:1;transform:none;pointer-events:auto;position:relative;
}
.auth-slide.exit{
  opacity:0;transform:translateX(-40px);position:absolute;
}
.slide-icon{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,rgba(124,92,191,.2),rgba(160,126,232,.1));
  border:1px solid rgba(160,126,232,.28);
  display:flex;align-items:center;justify-content:center;
  color:#b894ff;
  margin-bottom:24px;
  box-shadow:0 0 28px rgba(124,92,191,.18),0 0 0 1px rgba(255,255,255,.04) inset;
  transition:box-shadow .3s;
}
.auth-slide.active .slide-icon{
  box-shadow:0 0 40px rgba(124,92,191,.32),0 0 0 1px rgba(255,255,255,.06) inset;
}
.slide-headline{
  font-family:'Syne',var(--se);
  font-size:clamp(32px,3vw,48px);
  font-weight:800;
  color:#fff;
  line-height:1.1;
  letter-spacing:-.035em;
  margin-bottom:14px;
}
.slide-headline em{
  font-style:italic;
  background:linear-gradient(135deg,#d4b8ff 0%,#9b70ee 55%,#c4a0ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.slide-sub{
  font-size:15px;color:rgba(255,255,255,.46);
  line-height:1.72;max-width:380px;
  margin-bottom:30px;
  font-family:var(--sa);
}
.slide-features{display:flex;flex-direction:column;gap:14px;}

/* ── FEATURE ITEMS (in slideshow) ── */
.auth-feature{
  display:flex;align-items:center;gap:12px;
  animation:auth-feat-in .55s ease both;
}
.auth-feature:nth-child(1){animation-delay:.1s;}
.auth-feature:nth-child(2){animation-delay:.2s;}
.auth-feature:nth-child(3){animation-delay:.3s;}
@keyframes auth-feat-in{
  from{opacity:0;transform:translateX(-14px);}
  to{opacity:1;transform:none;}
}
.auth-feature-dot{
  width:7px;height:7px;border-radius:50%;
  background:linear-gradient(135deg,#d4b8ff,#9b70ee);
  flex-shrink:0;
  box-shadow:0 0 8px rgba(184,148,255,.7);
}
.auth-feature-text{
  font-size:13.5px;color:rgba(255,255,255,.58);
  font-family:var(--sa);line-height:1.4;
}
.auth-feature-text strong{color:rgba(255,255,255,.85);font-weight:600;}

/* slide controls */
#auth-slide-controls{
  display:flex;align-items:center;gap:14px;
  margin-top:6px;
}
.slide-arrow{
  width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  color:rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background .18s,color .18s,border-color .18s;
  flex-shrink:0;
}
.slide-arrow:hover{background:rgba(124,92,191,.28);border-color:rgba(160,126,232,.3);color:#fff;}
#slide-dots{display:flex;align-items:center;gap:7px;}
.slide-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.18);
  cursor:pointer;
  transition:background .25s,transform .25s,width .25s;
}
.slide-dot.active{
  background:#b894ff;
  transform:scale(1.5);
  box-shadow:0 0 6px rgba(184,148,255,.7);
}

/* ━━━━━━━━━━  HELP / ABOUT PANELS  ━━━━━━━━━━ */
.auth-info-panel{
  display:flex;flex-direction:column;gap:18px;
  max-height:420px;overflow-y:auto;
  padding-right:4px;
  scrollbar-width:thin;
  scrollbar-color:rgba(160,126,232,.3) transparent;
}
.auth-info-panel::-webkit-scrollbar{width:4px;}
.auth-info-panel::-webkit-scrollbar-thumb{background:rgba(160,126,232,.3);border-radius:4px;}
.auth-info-section{display:flex;flex-direction:column;gap:10px;}
.auth-info-heading{
  font-family:'Syne',var(--sa);font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(160,126,232,.8);
  padding-bottom:6px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.auth-info-item{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;
  padding:12px 14px;
}
.auth-info-q{
  font-size:13px;font-weight:600;color:rgba(255,255,255,.85);
  margin-bottom:5px;font-family:var(--sa);
}
.auth-info-a{
  font-size:12.5px;color:rgba(255,255,255,.45);
  line-height:1.6;font-family:var(--sa);
}
.auth-info-a strong{color:rgba(255,255,255,.75);}
.auth-info-a em{color:#b894ff;font-style:normal;}

/* about panel */
.auth-about-logo{display:flex;align-items:center;gap:14px;margin-bottom:4px;}
.auth-about-name{
  font-family:'Syne',var(--se);font-size:24px;font-weight:700;color:#fff;
}
.auth-about-name em{font-style:italic;color:#b894ff;}
.auth-about-tagline{
  font-family:'Syne',var(--se);font-size:15px;
  font-style:italic;color:rgba(255,255,255,.4);
  margin-bottom:4px;
}
.auth-about-desc{
  font-size:13px;color:rgba(255,255,255,.5);
  line-height:1.75;font-family:var(--sa);
}
.auth-about-pills{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;
}
.auth-about-pill{
  font-size:11.5px;font-weight:500;
  color:rgba(160,126,232,.9);
  background:rgba(124,92,191,.12);
  border:1px solid rgba(124,92,191,.25);
  border-radius:99px;padding:4px 12px;
  font-family:var(--sa);
}
.auth-about-version{
  font-size:11px;color:rgba(255,255,255,.25);
  margin-top:2px;font-family:var(--sa);
}
/* about panel extended grid */
.about-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:10px;margin:12px 0 6px
